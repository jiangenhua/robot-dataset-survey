<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机器人开源数据集调研 · 数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="topnav">
  <div class="nav-inner">
    <span class="nav-title">Robot Dataset Survey</span>
    <div class="nav-links">
      <a href="dashboard.html" class="active">数据看板</a>
      <a href="report.html">调研报告</a>
    </div>
  </div>
</nav>

<div class="container" style="padding-top:72px;">
  <h1>机器人 / 具身智能开源数据集调研</h1>
  <p class="subtitle">Interactive Dashboard · 89 Datasets · 2018-2026</p>

  <div class="stats-row" id="stats"></div>

  <!-- Bubble chart: full width, tall -->
  <div class="chart-card chart-full" style="margin-bottom:20px;">
    <h3>数据规模分布 — 时间 × 大小 × Domain（鼠标悬停气泡查看详情）</h3>
    <div style="height:450px;position:relative;"><canvas id="c2"></canvas></div>
    <div id="bubbleTopList" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);"></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card"><h3>发布年份分布</h3><canvas id="c1"></canvas></div>
    <div class="chart-card"><h3>Domain 领域分布</h3><canvas id="c3"></canvas></div>
    <div class="chart-card"><h3>数据来源 (真实 vs 仿真)</h3><canvas id="c4"></canvas></div>
    <div class="chart-card"><h3>机构贡献 Top 15</h3><canvas id="c5"></canvas></div>
    <div class="chart-card"><h3>数据类型分布</h3><canvas id="c6"></canvas></div>
    <div class="chart-card"><h3>标注体系覆盖率</h3><canvas id="c7"></canvas></div>
  </div>

  <!-- Top 20 full width -->
  <div class="chart-card chart-full" style="margin-bottom:32px;">
    <h3>数据集规模 Top 20 (GB)</h3>
    <div style="height:520px;position:relative;"><canvas id="c8"></canvas></div>
  </div>

  <h2 class="section-title">完整数据表</h2>
  <div class="table-controls" id="tableControls"></div>
  <div class="table-scroll-wrap"><table id="dataTable"><thead></thead><tbody></tbody></table></div>

  <footer>Robot Dataset Survey · 89 datasets (2018-2026) · <a href="https://github.com/jiangenhua/robot-dataset-survey">GitHub</a></footer>
</div>

<script>
Chart.register(ChartDataLabels);
let DATA=[];
const COLORS=['#6366f1','#22d3ee','#22c55e','#f59e0b','#ec4899','#ef4444','#8b5cf6','#14b8a6','#f97316','#64748b','#a78bfa','#2dd4bf','#fb923c','#f472b6','#38bdf8'];
const DOM_NAMES=['操作(Manipulation)','仿真基准','灵巧抓取','人形机器人','导航','VLA/基础模型','跨具身/统一','其他'];
const DOM_COLORS={'操作(Manipulation)':'#6366f1','仿真基准':'#22d3ee','灵巧抓取':'#22c55e','人形机器人':'#f59e0b','导航':'#ec4899','VLA/基础模型':'#8b5cf6','跨具身/统一':'#14b8a6','其他':'#64748b'};

fetch('data.json').then(r=>r.json()).then(d=>{DATA=d;renderAll();});

function classifyDomain(dom){
  if(!dom) return '其他';
  if(/导航/.test(dom)) return '导航';
  if(/灵巧|抓取|Grasp/.test(dom)) return '灵巧抓取';
  if(/人形|人体|humanoid/i.test(dom)) return '人形机器人';
  if(/VLA|基础模型|foundation/i.test(dom)) return 'VLA/基础模型';
  if(/终身|记忆|离线|benchmark/i.test(dom)&&/仿真/.test(dom)) return '仿真基准';
  if(/统一|增强|跨具身/.test(dom)) return '跨具身/统一';
  if(/操作|OXE|manipulation/i.test(dom)) return '操作(Manipulation)';
  return '其他';
}
function classifySource(src){
  if(!src) return '未知';
  if(/仿真/.test(src)&&/真实/.test(src)) return '混合';
  if(/仿真/.test(src)) return '仿真';
  return '真实采集';
}

function renderAll(){
  renderStats();renderTimeline();renderSizeBubble();renderDomain();renderSource();
  renderInstitution();renderDataType();renderAnnotation();renderTop20();renderTable();
}

function renderStats(){
  const total=DATA.length;
  const realCount=DATA.filter(d=>classifySource(d.data_source)==='真实采集').length;
  const instSet=new Set();
  DATA.forEach(d=>d.institution.split(/[+,;/]/).forEach(s=>{const n=s.trim();if(n.length>1)instSet.add(n);}));
  const items=[
    {n:total,l:'数据集总数',c:'var(--accent)'},
    {n:realCount,l:'真机数据集',c:'var(--green)'},
    {n:total-realCount,l:'仿真/混合',c:'#818cf8'},
    {n:instSet.size,l:'涉及机构',c:'var(--orange)'},
    {n:Math.round(realCount/total*100)+'%',l:'真机占比',c:'var(--pink)'},
  ];
  document.getElementById('stats').innerHTML=items.map(i=>`<div class="stat-card"><div class="num" style="color:${i.c}">${i.n}</div><div class="label">${i.l}</div></div>`).join('');
}

function renderTimeline(){
  const yc={};DATA.forEach(d=>{const y=d.date?.slice(0,4);if(y&&y!=='')yc[y]=(yc[y]||0)+1;});
  const labels=Object.keys(yc).sort();
  new Chart(document.getElementById('c1'),{type:'bar',
    data:{labels,datasets:[{label:'数据集数',data:labels.map(l=>yc[l]),backgroundColor:'rgba(99,102,241,0.7)',borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false},datalabels:{display:true,color:'#e1e4ea',anchor:'end',align:'top',font:{size:11,weight:'bold'}}},
      scales:{x:{ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}},y:{ticks:{color:'#8b8fa3',stepSize:5},grid:{color:'#2a2d3a'}}}}
  });
}

function renderSizeBubble(){
  const valid=DATA.filter(d=>d.size_gb&&parseFloat(d.size_gb)>0&&d.date);
  const domGroups={};
  valid.forEach(d=>{
    const dom=classifyDomain(d.domain);
    if(!domGroups[dom]) domGroups[dom]=[];
    const gb=parseFloat(d.size_gb);
    domGroups[dom].push({x:d.date.slice(0,7),y:gb,r:Math.min(Math.sqrt(gb)*1.0+3,35),name:d.name,gb,inst:d.institution});
  });

  const datasets=Object.entries(domGroups).map(([dom,pts])=>({
    label:dom,
    data:pts.map(p=>({x:p.x,y:p.y,r:p.r})),
    backgroundColor:(DOM_COLORS[dom]||'#64748b')+'77',
    borderColor:(DOM_COLORS[dom]||'#64748b'),
    borderWidth:1.5,
    hoverBackgroundColor:(DOM_COLORS[dom]||'#64748b')+'cc',
    hoverBorderWidth:2,
    _meta:pts,
  }));

  const allDates=[...new Set(valid.map(d=>d.date.slice(0,7)))].sort();

  new Chart(document.getElementById('c2'),{type:'bubble',
    data:{datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#e1e4ea',font:{size:11},usePointStyle:true,pointStyle:'circle'},position:'top'},
        datalabels:{display:false},
        tooltip:{
          backgroundColor:'rgba(26,29,40,0.95)',
          titleColor:'#22d3ee',bodyColor:'#e1e4ea',borderColor:'#2a2d3a',borderWidth:1,
          padding:10,cornerRadius:8,
          callbacks:{
            title:function(items){const i=items[0].dataIndex;const ds=items[0].dataset;return ds._meta[i].name;},
            label:function(ctx){const m=ctx.dataset._meta[ctx.dataIndex];return[`Size: ${m.gb.toLocaleString()} GB`,`Date: ${m.x}`,`Domain: ${ctx.dataset.label}`,`Institution: ${(m.inst||'').slice(0,40)}`];}
          }
        }
      },
      scales:{
        x:{type:'category',labels:allDates,ticks:{color:'#8b8fa3',maxRotation:50,font:{size:9},autoSkip:true,maxTicksLimit:25},grid:{color:'#1e2130'},title:{display:true,text:'发布日期',color:'#6b7080',font:{size:11}}},
        y:{type:'logarithmic',min:0.008,ticks:{color:'#8b8fa3',font:{size:10},callback:v=>{if([0.01,0.1,1,10,100,1000].includes(v))return v+' GB';return'';}},grid:{color:'#1e2130'},title:{display:true,text:'File Size (GB)',color:'#6b7080',font:{size:11}}}
      }
    }
  });

  const bigOnes=valid.filter(d=>parseFloat(d.size_gb)>=1).sort((a,b)=>parseFloat(b.size_gb)-parseFloat(a.size_gb));
  document.getElementById('bubbleTopList').innerHTML=`
    <div style="color:var(--muted);font-size:0.82rem;margin-bottom:8px;">数据集规模 ≥ 1GB（共 ${bigOnes.length} 个，按大小降序）</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      ${bigOnes.map((d,i)=>{
        const gb=parseFloat(d.size_gb);
        const dom=classifyDomain(d.domain);
        const color=DOM_COLORS[dom]||'#64748b';
        const sizeStr=gb>=1000?((gb/1000).toFixed(1)+' TB'):(gb>=100?Math.round(gb)+' GB':gb+' GB');
        return `<div style="background:${color}15;border:1px solid ${color}33;border-radius:6px;padding:4px 10px;font-size:0.78rem;display:inline-flex;align-items:center;gap:5px;">
          <span style="color:${color};font-weight:700;min-width:14px;text-align:right;">${i+1}</span>
          <span style="color:var(--text);font-weight:600;">${d.name}</span>
          <span style="color:var(--muted);font-size:0.72rem;">${sizeStr}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function renderDomain(){
  const dc={};DATA.forEach(d=>{const dom=classifyDomain(d.domain);dc[dom]=(dc[dom]||0)+1;});
  const entries=Object.entries(dc).sort((a,b)=>b[1]-a[1]);
  new Chart(document.getElementById('c3'),{type:'doughnut',
    data:{labels:entries.map(e=>`${e[0]} (${e[1]})`),datasets:[{data:entries.map(e=>e[1]),backgroundColor:entries.map(e=>DOM_COLORS[e[0]]||'#64748b'),borderWidth:0}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#e1e4ea',font:{size:11}}},datalabels:{display:true,color:'#fff',font:{size:11,weight:'bold'},formatter:(v,ctx)=>v>2?v:''}}}
  });
}

function renderSource(){
  const sc={};DATA.forEach(d=>{const s=classifySource(d.data_source);sc[s]=(sc[s]||0)+1;});
  const labels=Object.keys(sc);
  new Chart(document.getElementById('c4'),{type:'bar',
    data:{labels,datasets:[{label:'数据集数',data:labels.map(l=>sc[l]),backgroundColor:['rgba(34,197,94,0.7)','rgba(99,102,241,0.7)','rgba(245,158,11,0.7)','rgba(139,92,246,0.7)'],borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false},datalabels:{display:true,color:'#e1e4ea',anchor:'end',align:'top',font:{size:12,weight:'bold'}}},
      scales:{x:{ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}},y:{ticks:{color:'#8b8fa3',stepSize:10},grid:{color:'#2a2d3a'}}}}
  });
}

function renderInstitution(){
  const ic={};
  DATA.forEach(d=>d.institution.split(/[+,;/]/).forEach(s=>{const n=s.trim().replace(/\(.*\)/,'').trim();if(n.length>1)ic[n]=(ic[n]||0)+1;}));
  const sorted=Object.entries(ic).sort((a,b)=>b[1]-a[1]).slice(0,15);
  new Chart(document.getElementById('c5'),{type:'bar',
    data:{labels:sorted.map(s=>s[0].length>18?s[0].slice(0,18)+'…':s[0]),datasets:[{label:'贡献数',data:sorted.map(s=>s[1]),backgroundColor:COLORS,borderRadius:6}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},datalabels:{display:true,color:'#e1e4ea',anchor:'end',align:'right',font:{size:11,weight:'bold'}}},
      scales:{x:{ticks:{color:'#8b8fa3',stepSize:2},grid:{color:'#2a2d3a'}},y:{ticks:{color:'#8b8fa3',font:{size:11}},grid:{display:false}}}}
  });
}

function renderDataType(){
  const tc={'图片序列(RGB)':0,'RGB+Depth':0,'视频(MP4)':0,'点云/3D':0,'力矩/触觉':0,'运动序列':0,'多模态':0,'仿真环境':0,'其他':0};
  DATA.forEach(d=>{
    const t=d.data_type||'';
    if(/仿真环境/.test(t)) tc['仿真环境']++;
    else if(/力|触|Torque|tactile/i.test(t)) tc['力矩/触觉']++;
    else if(/运动|SMPL|motion/i.test(t)) tc['运动序列']++;
    else if(/点云|PointCloud|3D/i.test(t)) tc['点云/3D']++;
    else if(/多模态|RGB.*Depth.*力|RGB.*触/i.test(t)||/音频/.test(t)) tc['多模态']++;
    else if(/视频|MP4|video/i.test(t)) tc['视频(MP4)']++;
    else if(/Depth|深度/.test(t)) tc['RGB+Depth']++;
    else if(/图片|RGB|RLDS|HDF5|LeRobot|序列/i.test(t)) tc['图片序列(RGB)']++;
    else tc['其他']++;
  });
  const entries=Object.entries(tc).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);
  new Chart(document.getElementById('c6'),{type:'bar',
    data:{labels:entries.map(e=>e[0]),datasets:[{label:'数据集数',data:entries.map(e=>e[1]),backgroundColor:COLORS.slice(0,entries.length),borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false},datalabels:{display:true,color:'#e1e4ea',anchor:'end',align:'top',font:{size:11,weight:'bold'}}},
      scales:{x:{ticks:{color:'#8b8fa3',font:{size:10}},grid:{color:'#2a2d3a'}},y:{ticks:{color:'#8b8fa3',stepSize:10},grid:{color:'#2a2d3a'}}}}
  });
}

function renderAnnotation(){
  let cap=0,capGT=0,act=0,actGT=0,cam=0,camGT=0,view=0;
  DATA.forEach(d=>{
    if(d.caption){cap++;if(/GT|人工/.test(d.caption))capGT++;}
    if(d.action){act++;if(/GT/.test(d.action))actGT++;}
    if(d.camera_traj){cam++;if(/GT/.test(d.camera_traj))camGT++;}
    if(d.view_angle) view++;
  });
  const N=DATA.length;
  new Chart(document.getElementById('c7'),{type:'bar',
    data:{labels:['Caption','Action','Camera Traj.','镜头视角'],
      datasets:[
        {label:'有标注(%)',data:[cap/N*100,act/N*100,cam/N*100,view/N*100].map(v=>+v.toFixed(1)),backgroundColor:'rgba(99,102,241,0.6)',borderRadius:4},
        {label:'其中GT(%)',data:[capGT/N*100,actGT/N*100,camGT/N*100,0].map(v=>+v.toFixed(1)),backgroundColor:'rgba(34,197,94,0.6)',borderRadius:4},
      ]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#e1e4ea'}},datalabels:{display:true,color:'#e1e4ea',font:{size:10},formatter:v=>v>0?v+'%':''}},
      scales:{x:{ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}},y:{ticks:{color:'#8b8fa3',callback:v=>v+'%'},grid:{color:'#2a2d3a'}}}}
  });
}

function renderTop20(){
  const sorted=DATA.filter(d=>d.size_gb&&parseFloat(d.size_gb)>0).sort((a,b)=>parseFloat(b.size_gb)-parseFloat(a.size_gb)).slice(0,20);
  new Chart(document.getElementById('c8'),{type:'bar',
    data:{labels:sorted.map(d=>d.name),
      datasets:[{label:'GB',data:sorted.map(d=>parseFloat(d.size_gb)),backgroundColor:COLORS.concat(COLORS).slice(0,20),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},datalabels:{display:true,color:'#e1e4ea',anchor:'end',align:'right',font:{size:10,weight:'bold'},formatter:v=>v>=1?v.toLocaleString()+' GB':v+' GB'}},
      scales:{x:{type:'logarithmic',ticks:{color:'#8b8fa3',callback:v=>{if([0.1,1,10,100,1000].includes(v))return v;return'';}},grid:{color:'#2a2d3a'},title:{display:true,text:'File Size (GB, log scale)',color:'#8b8fa3'}},
              y:{ticks:{color:'#e1e4ea',font:{size:11}},grid:{display:false}}}}
  });
}

/* ========== Interactive Table with Column Filters ========== */
function renderTable(){
  const allCols=[
    {k:'name',l:'数据集',show:true,w:160},
    {k:'date',l:'日期',show:true,w:80},
    {k:'size_gb',l:'Size(GB)',show:true,w:80},
    {k:'institution',l:'机构',show:true,w:140},
    {k:'domain',l:'Domain',show:true,w:120},
    {k:'data_source',l:'数据来源',show:true,w:100},
    {k:'data_type',l:'数据类型',show:false,w:120},
    {k:'count',l:'数据量',show:true,w:140},
    {k:'duration',l:'时长',show:true,w:80},
    {k:'conclusion',l:'结论',show:true,w:200},
    {k:'note',l:'备注',show:false,w:150},
    {k:'paper',l:'论文',show:false,w:120},
    {k:'website',l:'链接',show:false,w:120},
    {k:'caption',l:'Caption',show:false,w:100},
    {k:'action',l:'Action',show:false,w:100},
    {k:'camera_traj',l:'Camera',show:false,w:100},
    {k:'view_angle',l:'视角',show:false,w:100},
    {k:'clone_cmd',l:'下载命令',show:false,w:150},
  ];
  window._allCols=allCols;
  window._tableFilters={};
  window.currentSort={key:'',asc:true};

  const ctrl=document.getElementById('tableControls');
  ctrl.innerHTML=`
    <div class="filter-bar" id="quickFilters"></div>
    <details class="col-selector">
      <summary>列选择 (点击展开/收起)</summary>
      <div class="col-checks" id="colChecks"></div>
    </details>
    <div class="col-filters" id="colFilters"></div>
  `;

  const cats=['全部','操作','仿真','真实采集','2024+','人形/导航'];
  document.getElementById('quickFilters').innerHTML=cats.map((c,i)=>`<button class="filter-btn ${i===0?'active':''}" onclick="quickFilter('${c}',this)">${c}</button>`).join('');

  const checksEl=document.getElementById('colChecks');
  checksEl.innerHTML=allCols.map(c=>`<label><input type="checkbox" ${c.show?'checked':''} onchange="toggleCol('${c.k}',this.checked)"> ${c.l}</label>`).join('');

  window.toggleCol=function(key,show){
    _allCols.find(c=>c.k===key).show=show;
    rebuildTable();
  };

  window.quickFilter=function(cat,btn){
    document.querySelectorAll('#quickFilters .filter-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    window._quickCat=cat;
    rebuildTable();
  };
  window._quickCat='全部';

  window.sortTable=function(key){
    if(currentSort.key===key) currentSort.asc=!currentSort.asc;
    else{currentSort.key=key;currentSort.asc=true;}
    rebuildTable();
  };

  rebuildTable();
}

function rebuildTable(){
  const cols=_allCols.filter(c=>c.show);
  const thead=document.querySelector('#dataTable thead');
  thead.innerHTML='<tr>'+cols.map(c=>{
    const arrow=currentSort.key===c.k?(currentSort.asc?' ▲':' ▼'):'';
    return `<th onclick="sortTable('${c.k}')" style="min-width:${c.w}px">${c.l}${arrow}</th>`;
  }).join('')+'</tr>'
  +'<tr class="filter-row">'+cols.map(c=>{
    const vals=getUniqueVals(c.k);
    if(vals.length>1&&vals.length<=30){
      const cur=_tableFilters[c.k]||'';
      return `<th style="padding:4px"><select onchange="_tableFilters['${c.k}']=this.value;rebuildTable();" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px;font-size:0.75rem;">
        <option value="">全部</option>${vals.map(v=>`<option value="${v}" ${v===cur?'selected':''}>${v.slice(0,20)}</option>`).join('')}
      </select></th>`;
    }
    return `<th style="padding:4px"><input type="text" placeholder="搜索..." oninput="_tableFilters['${c.k}']=this.value.toLowerCase();rebuildTable();" value="${_tableFilters[c.k]||''}" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px;font-size:0.75rem;"></th>`;
  }).join('')+'</tr>';

  let filtered=DATA;
  const cat=window._quickCat||'全部';
  if(cat==='操作') filtered=filtered.filter(d=>/操作|OXE/.test(d.domain));
  else if(cat==='仿真') filtered=filtered.filter(d=>/仿真/.test(d.data_source));
  else if(cat==='真实采集') filtered=filtered.filter(d=>/真实|Human/.test(d.data_source));
  else if(cat==='2024+') filtered=filtered.filter(d=>parseInt(d.date)>=2024);
  else if(cat==='人形/导航') filtered=filtered.filter(d=>/人形|导航|humanoid|人体/i.test(d.domain));

  for(const[k,v] of Object.entries(_tableFilters)){
    if(!v) continue;
    filtered=filtered.filter(d=>{
      const val=String(d[k]||'').toLowerCase();
      return val.includes(v.toLowerCase());
    });
  }

  if(currentSort.key){
    filtered=[...filtered].sort((a,b)=>{
      let va=a[currentSort.key]||'',vb=b[currentSort.key]||'';
      const na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb)) return currentSort.asc?na-nb:nb-na;
      return currentSort.asc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
    });
  }

  const tbody=document.querySelector('#dataTable tbody');
  tbody.innerHTML=filtered.map(d=>'<tr>'+cols.map(c=>{
    let v=d[c.k]||'';
    if(c.k==='name') return `<td><strong>${v}</strong></td>`;
    if(c.k==='data_source'){
      const s=classifySource(v);
      const tag=s==='真实采集'?'tag-real':(s==='仿真'?'tag-sim':'tag-mix');
      return `<td><span class="tag ${tag}">${s}</span></td>`;
    }
    if(c.k==='domain') return `<td>${classifyDomain(v)}</td>`;
    if(c.k==='website'||c.k==='paper'){
      const url=(v.match(/https?:\/\/[^\s,]+/)||[''])[0];
      return url?`<td><a href="${url}" target="_blank" title="${v}">链接</a></td>`:`<td>${v.slice(0,30)}</td>`;
    }
    return `<td title="${v}">${String(v).slice(0,50)}</td>`;
  }).join('')+'</tr>').join('');
}

function getUniqueVals(key){
  const set=new Set();
  DATA.forEach(d=>{
    let v=d[key]||'';
    if(key==='domain') v=classifyDomain(v);
    else if(key==='data_source') v=classifySource(v);
    else if(key==='date') v=v.slice(0,4);
    if(v&&v.length<40) set.add(v);
  });
  return [...set].sort();
}
